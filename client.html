<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Project Budget Tracker - Viewer</title>
    <meta name="description" content="View-only access for the day-by-day expense tracker.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Hide actions specifically for client view just in case */
        .expense-actions .delete-btn {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-icon">
                <i class="fas fa-hammer"></i>
            </div>
            <div>
                <h1>House Project Tracker</h1>
                <p>Viewer Mode: 70,000 budget summary</p>
            </div>
        </header>

        <main>
            <!-- Dashboard Overview -->
            <section class="dashboard">
                <div class="card balance-card glass">
                    <div class="card-header">
                        <div class="card-title">Remaining Balance</div>
                        <i class="fas fa-wallet text-muted"></i>
                    </div>
                    <div class="card-value highlight" id="remainingBalance">70,000</div>

                    <div class="progress-wrapper">
                        <div class="progress-labels">
                            <span id="spentPercentage">0% spent</span>
                            <span>100%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="budgetProgress"></div>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card stat-card glass">
                        <div class="icon-box blue">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <div class="stat-content">
                            <div class="card-title">Total Budget</div>
                            <div class="card-value small" id="totalBudget">70,000</div>
                        </div>
                    </div>
                    <div class="card stat-card glass">
                        <div class="icon-box red">
                            <i class="fas fa-arrow-trend-down"></i>
                        </div>
                        <div class="stat-content">
                            <div class="card-title">Total Spent</div>
                            <div class="card-value small" id="totalSpent">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Expense History -->
            <section class="expense-history">
                <div class="section-header flex-between">
                    <h2>Daily Expenses</h2>
                    <div class="sort-control">
                        <select id="sortOrder" class="glass-select">
                            <option value="desc">Newest First</option>
                            <option value="asc">Oldest First</option>
                        </select>
                    </div>
                </div>

                <div id="expenseList" class="expense-list">
                    <!-- Expenses injected via JS -->
                </div>

                <div id="emptyState" class="empty-state glass hidden">
                    <div class="empty-icon">
                        <i class="fas fa-receipt"></i>
                    </div>
                    <h3>No expenses yet</h3>
                    <p>The administrator hasn't added any expenses yet.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Template for an expense day group -->
    <template id="dayGroupTemplate">
        <div class="day-group">
            <h3 class="day-header">
                <span class="day-date"></span>
                <span class="day-total"></span>
            </h3>
            <div class="day-items"></div>
        </div>
    </template>

    <!-- Template for a single expense item -->
    <template id="expenseItemTemplate">
        <div class="expense-item glass hover-glow">
            <div class="expense-info">
                <div class="expense-icon">
                    <i class="fas fa-tools"></i>
                </div>
                <div class="expense-details">
                    <h4 class="expense-name"></h4>
                    <span class="expense-time"></span>
                </div>
            </div>
            <div class="expense-actions">
                <span class="expense-amount"></span>
            </div>
        </div>
    </template>

    <script src="client.js"></script>
</body>

</html>
