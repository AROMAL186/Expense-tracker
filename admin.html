<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Project Budget Tracker</title>
    <meta name="description" content="A beautiful and intuitive day-by-day expense tracker for your house project.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-icon">
                <i class="fas fa-hammer"></i>
            </div>
            <div>
                <h1>House Project Tracker</h1>
                <p>Admin Mode: Manage 70,000 budget</p>
            </div>
            <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                <button id="resetBtn" class="icon-btn" title="Reset All Data">
                    <i class="fas fa-rotate-right"></i>
                </button>
                <button id="logoutBtn" class="icon-btn" title="Logout" style="color:var(--accent-danger);">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main>
            <!-- Dashboard Overview -->
            <section class="dashboard">
                <div class="card balance-card glass">
                    <div class="card-header">
                        <div class="card-title">Remaining Balance</div>
                        <i class="fas fa-wallet text-muted"></i>
                    </div>
                    <div class="card-value highlight" id="remainingBalance">70,000</div>

                    <div class="progress-wrapper">
                        <div class="progress-labels">
                            <span id="spentPercentage">0% spent</span>
                            <span>100%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="budgetProgress"></div>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card stat-card glass">
                        <div class="icon-box blue">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <div class="stat-content">
                            <div class="card-title">Total Budget</div>
                            <div class="card-value small" id="totalBudget">70,000</div>
                        </div>
                    </div>
                    <div class="card stat-card glass">
                        <div class="icon-box red">
                            <i class="fas fa-arrow-trend-down"></i>
                        </div>
                        <div class="stat-content">
                            <div class="card-title">Total Spent</div>
                            <div class="card-value small" id="totalSpent">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Add Expense Section -->
            <section class="add-expense-section">
                <div class="section-header">
                    <h2>Record Expense</h2>
                </div>
                <form id="expenseForm" class="card form-card glass">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="expenseDate">Date</label>
                            <div class="input-wrapper">
                                <i class="fas fa-calendar-alt input-icon"></i>
                                <input type="date" id="expenseDate" required>
                            </div>
                        </div>
                        <div class="form-group flex-1">
                            <label for="expenseAmount">Amount</label>
                            <div class="input-wrapper">
                                <i class="fas fa-rupee-sign input-icon"></i>
                                <input type="number" id="expenseAmount" placeholder="0" min="1" step="0.01" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="expenseDesc">Description</label>
                        <div class="input-wrapper">
                            <i class="fas fa-tag input-icon"></i>
                            <input type="text" id="expenseDesc" placeholder="e.g., Cement, Paint, Labor..."
                                autocomplete="off" required>
                        </div>
                    </div>
                    <button type="submit" id="submitExpenseBtn" class="btn primary-btn">
                        <i class="fas fa-plus"></i> Add Expense
                    </button>
                </form>
            </section>

            <!-- Expense History -->
            <section class="expense-history">
                <div class="section-header flex-between">
                    <h2>Daily Expenses</h2>
                    <div class="sort-control">
                        <select id="sortOrder" class="glass-select">
                            <option value="desc">Newest First</option>
                            <option value="asc">Oldest First</option>
                        </select>
                    </div>
                </div>

                <div id="expenseList" class="expense-list">
                    <!-- Expenses injected via JS -->
                </div>

                <div id="emptyState" class="empty-state glass hidden">
                    <div class="empty-icon">
                        <i class="fas fa-receipt"></i>
                    </div>
                    <h3>No expenses yet</h3>
                    <p>Add your first house expense above to get started.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Template for an expense day group -->
    <template id="dayGroupTemplate">
        <div class="day-group">
            <h3 class="day-header">
                <span class="day-date"></span>
                <span class="day-total"></span>
            </h3>
            <div class="day-items"></div>
        </div>
    </template>

    <!-- Template for a single expense item -->
    <template id="expenseItemTemplate">
        <div class="expense-item glass hover-glow">
            <div class="expense-info">
                <div class="expense-icon">
                    <i class="fas fa-tools"></i>
                </div>
                <div class="expense-details">
                    <h4 class="expense-name"></h4>
                    <span class="expense-time"></span>
                </div>
            </div>
            <div class="expense-actions">
                <span class="expense-amount"></span>
                <button class="edit-btn" title="Edit Expense">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="delete-btn" title="Delete Expense">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
